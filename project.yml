name: UsbMapper
options:
  deploymentTarget:
    macOS: "13.0"
targets:
  UsbMapper:
    type: application
    platform: macOS
    sources:
      - path: Sources/UsbMapper
        excludes:
          - "Resources/Info.plist"
          - "Resources/cyme"
      - path: Sources/UsbMapper/Resources/cyme
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.davidlynch.UsbMapper
        INFOPLIST_FILE: Sources/UsbMapper/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: "YES"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - sdk: IOKit.framework
    postBuildScripts:
      - name: Sign bundled cyme with Hardened Runtime
        script: |
          CYME="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/cyme"
          # Only sign when an identity is set (skips unsigned/test builds)
          if [[ -f "${CYME}" && -n "${CODE_SIGN_IDENTITY}" && "${CODE_SIGN_IDENTITY}" != "-" ]]; then
            codesign --force \
                     --sign "${CODE_SIGN_IDENTITY}" \
                     --options runtime \
                     --timestamp \
                     "${CYME}"
          fi
        basedOnDependencyAnalysis: false
